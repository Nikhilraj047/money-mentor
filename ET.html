<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Money Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #38bdf8;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      text-align: left;
      animation: fadeIn 0.8s ease-in-out;
    }

    .tag {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💰 AI Money Mentor</h1>
  <div class="tag">Your Smart Financial Guide</div>

  <input type="number" id="income" placeholder="Monthly Income (₹)">
  <input type="number" id="expenses" placeholder="Monthly Expenses (₹)">

  <select id="goal">
    <option value="saving">Saving Money</option>
    <option value="car">Buy a Car</option>
    <option value="house">Buy a House</option>
  </select>

  <button onclick="generatePlan()">Generate AI Plan</button>

  <div id="result" class="result" style="display:none;"></div>
</div>

<script>
function generatePlan() {
  let income = parseInt(document.getElementById("income").value);
  let expenses = parseInt(document.getElementById("expenses").value);
  let goal = document.getElementById("goal").value;

  if (!income || !expenses) {
    alert("Please fill all fields!");
    return;
  }

  let savings = income - expenses;
  let invest = Math.floor(savings * 0.6);
  let emergency = Math.floor(savings * 0.4);

  let advice = "";
  if (goal === "car") {
    advice = "Invest aggressively in SIPs to reach your car goal faster.";
  } else if (goal === "house") {
    advice = "Focus on long-term investments and increase savings ratio.";
  } else {
    advice = "Track expenses and maintain a consistent saving habit.";
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <h3>📊 Financial Plan</h3><br>
    💰 Savings: ₹${savings} <br><br>
    📈 Investment (SIP): ₹${invest} <br>
    🛡 Emergency Fund: ₹${emergency} <br><br>
    🤖 AI Insight: ${advice}
  `;
}
</script>

</body>
</html>
